<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Kuşhane</title>
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="manifest" href="manifest.json">
    <link rel="apple-touch-icon" href="kushane_icon.png">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Playwrite+AU+TAS:wght@100..400&display=swap');
        :root { --maroon: #800000; --forest-green: #228B22; --amber: #FF9700; }
        body, html { margin: 0; padding: 0; height: 100%; width: 100%; background: #000 url('pigeon_darkened.jpg') no-repeat center center fixed; background-size: cover; font-family: sans-serif; color: white; overflow: hidden; display: flex; justify-content: center; }
        .vertical-column { width: 100%; max-width: 400px; position: relative; display: flex; flex-direction: column; align-items: center; background: rgba(0,0,0,0.6); box-shadow: inset 0 0 50px #000; }
        .app-wrapper { width: 100%; padding: 100px 20px 20px; display: flex; flex-direction: column; align-items: center; box-sizing: border-box; }
        .app-title { font-family: 'Playwrite AU TAS', cursive; font-size: 2.2rem; margin-bottom: 50px; -webkit-text-stroke: 1.2px white; color: #000; text-align: center; }
        .status-container { display: flex; align-items: center; width: 100%; background: rgba(0,0,0,0.85); padding: 20px; border-radius: 0 15px 15px 0; margin-left: -40px; margin-bottom: 40px; border-left: 5px solid var(--amber); }
        .label-text { font-size: 1.5rem; font-weight: bold; margin-left: 40px; margin-right: 15px; }
        #stat { font-size: 1.5rem; font-weight: bold; color: #aaa; }
        .btn { width: 100%; height: 75px; border-radius: 18px; font-size: 1.6rem; font-weight: bold; color: white; border: none; margin-bottom: 20px; transition: 0.2s; box-shadow: 0 4px 10px rgba(0,0,0,0.5); }
        .btn:active { transform: scale(0.98); opacity: 0.8; }
        #btn-open { background-color: var(--maroon); }
        #btn-close { background-color: var(--forest-green); }
        .conn-status { position: absolute; bottom: 40px; display: flex; align-items: center; gap: 10px; font-size: 1rem; font-weight: bold; }
        .dot { width: 12px; height: 12px; border-radius: 50%; background-color: #555; }
        .settings-btn { position: absolute; top: 30px; right: 30px; width: 35px; filter: invert(1); cursor: pointer; z-index: 100; }
        #settingsModal { display: none; position: fixed; top: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.95); z-index: 1000; justify-content: center; align-items: center; }
        .modal-box { width: 85%; max-width: 320px; background: #111; padding: 35px; border-radius: 25px; text-align: center; border: 1px solid #333; }
        input[type=range] { width: 100%; margin: 25px 0; accent-color: white; }
    </style>
</head>
<body>
    <div class="vertical-column">
        <img src="settings_icon.png" class="settings-btn" onclick="toggleModal(true)">
        <div class="app-wrapper">
            <div class="app-title">Kuşhane</div>
            <div class="status-container">
                <span class="label-text">Kapı:</span>
                <span id="stat">Bekleniyor...</span>
            </div>
            <button id="btn-open" class="btn" onclick="send('1')">AÇ</button>
            <button id="btn-close" class="btn" onclick="send('0')">KAPAT</button>
        </div>
        <div class="conn-status">
            <div id="dot" class="dot"></div>
            <span id="statusText">SİSTEM BAŞLATILIYOR</span>
        </div>
    </div>

    <div id="settingsModal">
        <div class="modal-box">
            <h2 style="margin:0">Süre Ayarı</h2>
            <div id="durVal" style="font-size:1.8rem; margin:25px 0; color:var(--amber)">10.0 sn</div>
            <input type="range" id="timerSld" min="1" max="30" step="0.5" value="10" oninput="updateLbl(this.value)">
            <div style="display:flex; gap:15px; margin-top:10px">
                <button onclick="toggleModal(false)" style="flex:1; padding:12px; background:#333; color:#fff; border:none; border-radius:12px; font-weight:bold">İPTAL</button>
                <button onclick="save()" style="flex:1; padding:12px; background:var(--forest-green); color:#fff; border:none; border-radius:12px; font-weight:bold">KAYDET</button>
            </div>
        </div>
    </div>

    <script src="https://unpkg.com/mqtt/dist/mqtt.min.js"></script>
    <script>
        const devID = "73215944"; 
        const options = {
            clientId: 'Kushane_App_' + Math.random().toString(16).substr(2, 5),
            username: 'kushane_admin', password: 'pPBM8TpY!JWyz3S',
            clean: true, connectTimeout: 15000, rejectUnauthorized: false
        };

        const client = mqtt.connect('wss://9461d979ef2044fd9edf271202106b7c.s1.eu.hivemq.cloud:8884/mqtt', options);

        client.on('connect', () => {
            console.log("Bağlandı");
            client.subscribe(`kushane/${devID}/status`);
            client.subscribe(`kushane/${devID}/presence`);
            client.subscribe(`kushane/${devID}/current_timer`);
        });

        client.on('message', (topic, payload) => {
            const msg = payload.toString().trim();
            
            if (topic === `kushane/${devID}/presence`) {
                const online = (msg === 'online');
                const st = document.getElementById('statusText');
                const dt = document.getElementById('dot');
                st.innerText = online ? 'CİHAZ BAĞLI' : 'CİHAZ ÇEVRİMDIŞI';
                st.style.color = online ? '#228B22' : '#800000';
                dt.style.backgroundColor = online ? '#228B22' : '#800000';
            }

            if (topic === `kushane/${devID}/status`) {
                const s = document.getElementById('stat');
                if (msg === "busy") { s.innerText = "İşlem Yapılıyor..."; s.style.color = "orange"; }
                else if (msg === "1") { s.innerText = "Açık"; s.style.color = "white"; }
                else if (msg === "0") { s.innerText = "Kapalı"; s.style.color = "white"; }
            }

            if (topic === `kushane/${devID}/current_timer`) {
                document.getElementById('timerSld').value = msg;
                document.getElementById('durVal').innerText = msg + " sn";
            }
        });

        function send(val) {
            if (client.connected) {
                client.publish(`kushane/${devID}/control`, val, { qos: 1 });
            }
        }

        function save() {
            const v = document.getElementById('timerSld').value;
            if (client.connected) {
                client.publish(`kushane/${devID}/set_timer`, v, { qos: 1, retain: true });
            }
            toggleModal(false);
        }

        function toggleModal(show) { document.getElementById('settingsModal').style.display = show ? 'flex' : 'none'; }
        function updateLbl(v) { document.getElementById('durVal').innerText = v + " sn"; }
    </script>
</body>
</html>
